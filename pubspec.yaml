name: dummy_app_2026
description: "Flutter Clean Architecture - E-Commerce Demo App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.3

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.8.0+1

  # Local Storage
  hive_flutter: ^1.1.0

  # Localization
  easy_localization: ^3.0.7

  # Functional programming
  dartz: ^0.10.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/translations/
